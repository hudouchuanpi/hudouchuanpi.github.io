<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  font-weight:300;
  font-size:14px;
  line-height:1.75;
  color:#1a1a1a;
  background:#fffcf5;
}

/* bg */
.bg{
  position:fixed;
  z-index:0;
  width:160%;
  height:160%;
  top:-30%;
  left:-30%;
  will-change:transform;
}
.bg img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  display:block;
}

/* pixel scatter canvas — sits above bg, below content */
#pixelCanvas{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
}

.site{position:relative;z-index:3;}

/* scroll hint */
.scroll-hint{
  position:fixed;
  bottom:36px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  pointer-events:none;
  opacity:1;
  transition:opacity 0.5s;
}
.scroll-hint.hidden{opacity:0;}
.scroll-hint-label{
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.35);
}
.scroll-hint-dots{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.scroll-hint-dots span{
  display:block;
  width:3px;
  height:3px;
  background:#555;
}
.scroll-hint-dots span:nth-child(1){animation:dotfall 1.6s 0.00s ease-in-out infinite;}
.scroll-hint-dots span:nth-child(2){animation:dotfall 1.6s 0.15s ease-in-out infinite;}
.scroll-hint-dots span:nth-child(3){animation:dotfall 1.6s 0.30s ease-in-out infinite;}
.scroll-hint-dots span:nth-child(4){animation:dotfall 1.6s 0.45s ease-in-out infinite;}
.scroll-hint-dots span:nth-child(5){animation:dotfall 1.6s 0.60s ease-in-out infinite;}
.scroll-hint-dots span:nth-child(6){animation:dotfall 1.6s 0.75s ease-in-out infinite;}
@keyframes dotfall{
  0%,100%{opacity:0.1;}
  50%{opacity:0.9;}
}

/* lang bar */
.lang-bar{position:fixed;top:24px;right:28px;z-index:200;display:flex;}
.lang-btn{
  background:rgba(255,252,245,0.88);
  border:0.5px solid rgba(0,0,0,0.13);
  color:rgba(0,0,0,0.38);
  font-family:'Inter',sans-serif;
  font-size:10px;letter-spacing:0.1em;
  padding:5px 11px;cursor:pointer;transition:all 0.18s;
}
.lang-btn:first-child{border-radius:2px 0 0 2px;}
.lang-btn:last-child{border-radius:0 2px 2px 0;}
.lang-btn.active{background:rgba(255,252,245,0.98);color:#1a1a1a;border-color:rgba(0,0,0,0.26);}
.lang-btn:hover:not(.active){color:#1a1a1a;}

/* nav */
nav{position:fixed;top:0;left:0;z-index:200;padding:24px 28px;display:flex;gap:22px;}
nav a{
  font-size:10px;letter-spacing:0.13em;text-transform:uppercase;
  color:rgba(0,0,0,0.36);text-decoration:none;transition:color 0.18s;
}
nav a:hover{color:#1a1a1a;}

/* hero */
.hero{
  height:100vh;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 36px 48px;
}
.hero-name{
  font-family:'EB Garamond',serif;
  font-size:clamp(42px,6vw,78px);
  font-weight:400;letter-spacing:-0.01em;line-height:1.0;
  color:#1a1a1a;
}
.hero-sub{
  font-size:11px;letter-spacing:0.13em;text-transform:uppercase;
  color:rgba(0,0,0,0.42);margin-top:10px;
}

/* panels */
.panel{
  background:rgba(255,252,245,0.93);
  padding:72px 36px;
  border-top:0.5px solid rgba(0,0,0,0.08);
}
.panel-inner{max-width:620px;}
.eyebrow{
  font-size:10px;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(0,0,0,0.3);margin-bottom:28px;
}
.about-lead{
  font-family:'EB Garamond',serif;
  font-size:20px;line-height:1.65;color:#1a1a1a;margin-bottom:36px;
}
.meta-row{
  display:grid;grid-template-columns:110px 1fr;
  gap:12px;padding:12px 0;
  border-top:0.5px solid rgba(0,0,0,0.08);font-size:13px;
}
.meta-key{color:rgba(0,0,0,0.33);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding-top:1px;}
.meta-val{color:#1a1a1a;}
.tl-item{
  display:grid;grid-template-columns:96px 1fr;gap:20px;
  padding:22px 0;border-top:0.5px solid rgba(0,0,0,0.08);
}
.tl-year{font-size:11px;color:rgba(0,0,0,0.3);letter-spacing:0.04em;padding-top:3px;line-height:1.5;}
.tl-role{font-family:'EB Garamond',serif;font-size:17px;color:#1a1a1a;margin-bottom:3px;}
.tl-org{font-size:12px;color:rgba(0,0,0,0.38);margin-bottom:7px;}
.tl-body{font-size:13px;color:rgba(0,0,0,0.58);line-height:1.65;}
.pub-item{
  display:grid;grid-template-columns:44px 1fr;gap:16px;
  padding:20px 0;border-top:0.5px solid rgba(0,0,0,0.08);
}
.pub-yr{font-size:11px;color:rgba(0,0,0,0.28);padding-top:3px;}
.pub-title{font-family:'EB Garamond',serif;font-size:16px;line-height:1.45;color:#1a1a1a;margin-bottom:4px;}
.pub-meta{font-size:12px;color:rgba(0,0,0,0.38);line-height:1.5;}
.pub-meta b{color:rgba(0,0,0,0.52);font-weight:400;}
.pub-chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.chip{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;border:0.5px solid rgba(0,0,0,0.13);color:rgba(0,0,0,0.38);padding:2px 7px;border-radius:1px;}
.chip.aw{border-color:rgba(140,95,20,0.3);color:rgba(120,80,10,0.8);}
.pub-link{display:inline-block;margin-top:6px;font-size:11px;color:rgba(0,0,0,0.26);text-decoration:none;letter-spacing:0.07em;transition:color 0.18s;}
.pub-link:hover{color:#1a1a1a;}
.painting-break{height:55vh;}
.contact-quote{
  font-family:'EB Garamond',serif;font-size:23px;font-style:italic;
  color:rgba(0,0,0,0.52);margin-bottom:30px;line-height:1.55;
}
.clinks{display:flex;flex-wrap:wrap;gap:20px;}
.clinks a{
  font-size:12px;letter-spacing:0.07em;color:rgba(0,0,0,0.36);
  text-decoration:none;display:flex;align-items:center;gap:5px;transition:color 0.18s;
}
.clinks a::before{content:"→";font-size:10px;}
.clinks a:hover{color:#1a1a1a;}
footer{
  background:rgba(255,252,245,0.97);border-top:0.5px solid rgba(0,0,0,0.08);
  padding:22px 36px;display:flex;justify-content:space-between;align-items:center;
}
.foot-copy{font-size:10px;letter-spacing:0.07em;color:rgba(0,0,0,0.28);}

@media(max-width:600px){
  nav{gap:14px;padding:18px;}
  .hero{padding:0 18px 36px;}
  .panel{padding:52px 18px;}
  .tl-item,.pub-item{grid-template-columns:1fr;gap:6px;}
  .meta-row{grid-template-columns:1fr;gap:3px;}
  footer{padding:18px;flex-direction:column;gap:6px;align-items:flex-start;}
  .lang-bar{top:18px;right:18px;}
}
@media(prefers-reduced-motion:reduce){
  .bg{transition:none!important;}
  .scroll-hint-dots span{animation:none!important;opacity:0.3;}
}
</style>
</head>

<script>
// ── palette from painting ──
const PALETTE = [[152, 166, 181], [154, 141, 152], [53, 48, 51], [187, 191, 194], [166, 168, 148], [212, 195, 186], [221, 207, 214], [189, 184, 189], [213, 200, 127], [138, 115, 95], [216, 201, 127], [167, 166, 121], [233, 224, 219], [153, 138, 150], [154, 141, 101], [65, 63, 68], [156, 139, 151], [172, 137, 154], [144, 152, 143], [183, 193, 204], [179, 159, 159], [223, 208, 206], [208, 199, 190], [172, 173, 154]];

// ── pixel scatter on canvas ──
const cvs = document.getElementById('pixelCanvas');
const ctx = cvs.getContext('2d');
let dots = [];

function resize() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
}

function spawnDots() {
  dots = [];
  const count = Math.floor((cvs.width * cvs.height) / 14000);
  for (let i = 0; i < count; i++) {
    const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    dots.push({
      x: Math.random() * cvs.width,
      y: Math.random() * cvs.height,
      size: Math.random() < 0.7 ? 3 : (Math.random() < 0.5 ? 5 : 7),
      r: c[0], g: c[1], b: c[2],
      alpha: 0.12 + Math.random() * 0.22,
      drift: (Math.random() - 0.5) * 0.18,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawDots(t) {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  for (const d of dots) {
    // gentle float
    const dy = Math.sin(t * 0.0004 + d.phase) * 6;
    const dx = Math.cos(t * 0.0003 + d.phase) * 3;
    ctx.fillStyle = `rgba(${d.r},${d.g},${d.b},${d.alpha})`;
    ctx.fillRect(
      Math.round(d.x + dx),
      Math.round(d.y + dy),
      d.size, d.size
    );
  }
  requestAnimationFrame(drawDots);
}

resize();
spawnDots();
requestAnimationFrame(drawDots);
window.addEventListener('resize', () => { resize(); spawnDots(); });

// ── parallax ──
const bgEl = document.getElementById('bg');
let mx = 0, my = 0, cx = 0, cy = 0;
const STRENGTH = 120;

document.addEventListener('mousemove', e => {
  mx = (e.clientX / window.innerWidth  - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
});
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mx = (t.clientX / window.innerWidth  - 0.5) * 2;
  my = (t.clientY / window.innerHeight - 0.5) * 2;
}, {passive:true});

function parallax() {
  cx += (mx - cx) * 0.05;
  cy += (my - cy) * 0.05;
  bgEl.style.transform = `translate(${cx * STRENGTH}px, ${cy * STRENGTH}px)`;
  requestAnimationFrame(parallax);
}
parallax();

// ── scroll hint: hide only at page bottom ──
const hint = document.getElementById('scrollHint');
const footer = document.getElementById('footer');
window.addEventListener('scroll', () => {
  const footerTop = footer.getBoundingClientRect().top;
  if (footerTop <= window.innerHeight) {
    hint.classList.add('hidden');
  } else {
    hint.classList.remove('hidden');
  }
});

// ── lang ──
function setLang(lang) {
  document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  document.querySelectorAll('[data-'+lang+']').forEach(el => {
    el.textContent = el.getAttribute('data-'+lang);
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+lang).classList.add('active');
}
setLang('en');
</script>
